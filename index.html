<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#f5e6c8" />
    <meta name="application-name" content="Feudum" />
    <meta name="description" content="Construye tu reino medieval, investiga tecnologías y conquista el mundo." />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Feudum" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />

    <!-- Splash screens for iOS (landscape + portrait, minimal set) -->
    <meta name="msapplication-TileColor" content="#f5e6c8" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <title>Feudum</title>

    <!-- Apply dark class before first paint to avoid flash of wrong theme -->
    <script>
      (function(){try{var s=JSON.parse(localStorage.getItem('feudum-theme')||'{}');var m=(s.state||{}).mode||'auto';if(m==='dark'||(m!=='light'&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark')}catch(e){}})()
    </script>

    <!-- Preconnect to Google Fonts to avoid extra DNS+TLS round trips -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
